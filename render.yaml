services:
  - type: web
    name: presentation-api
    runtime: python
    plan: free
    buildCommand: ./build.sh
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: presentation-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: presentation-redis
          type: keyvalue
          property: connectionString
      - key: ALLOWED_HOSTS
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: EMAIL_HOST
        value: smtp.yandex.ru
      - key: EMAIL_PORT
        value: "465"
      - key: EMAIL_USE_SSL
        value: "True"
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: DEFAULT_FROM_EMAIL
        sync: false
      - key: EMAIL_ADMIN
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false

databases:
  - name: presentation-db
    plan: free
    databaseName: presentation_api
    user: presentation_api
