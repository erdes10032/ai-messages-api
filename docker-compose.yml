# Секреты и настройки — в .env.example (секция Docker)
# Запуск: docker compose --env-file .env.example up --build

services:
  db:
    image: postgres:18.1-alpine3.22
    env_file:
      - .env.example
    environment:
      POSTGRES_DB: ${DB_NAME:-presentation-api}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change-me-postgres-password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-presentation-api}']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:8.4-alpine
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    ports:
      - '8000:8000'
    env_file:
      - .env.example
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - app_logs:/app/logs

volumes:
  postgres_data:
  app_logs:
